name: CRE Crisis Monitor — Daily Update

on:
  schedule:
    # Runs every day at 7:00 AM UTC (2AM Eastern / 11PM Pacific)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to commit data.json back to repo

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No external packages needed — using only stdlib

      - name: Run data fetcher
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NTFY_TOPIC:   ${{ secrets.NTFY_TOPIC }}
        run: |
          python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "Crisis Monitor Bot"
          git add data.json alert_state.json
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
